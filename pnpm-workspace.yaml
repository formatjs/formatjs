packages:
  # Published packages with checked-in generated manifests.
  - 'packages/*'
  - 'website'
  - 'docs'
  - 'benchmarks/*'
  - '!packages/editor'

linkWorkspacePackages: true

catalog:
  vite: ^8.0.0

overrides:
  '@jest/transform': ^29.0.0
  '@jest/types': ^29.0.0
  '@tailwindcss/vite>vite': 'catalog:'
  babel-jest: ^29.0.0
  jest: ^29.0.0
  jest-util: ^29.0.0

packageExtensions:
  '@vue/compiler-core':
    dependencies:
      '@babel/types': '*'
  '@vue/compiler-sfc':
    dependencies:
      '@typescript/typescript6': 6.0.2
  '@vue/reactivity-transform':
    dependencies:
      '@babel/types': '*'
  '@vue/test-utils':
    dependencies:
      '@vue/compiler-dom': '*'
  '@glimmer/interfaces':
    dependencies:
      '@glimmer/reference': '*'
      '@glimmer/validator': '*'
  '@glimmer/syntax':
    dependencies:
      '@glimmer/env': '*'
  ember-template-recast:
    dependencies:
      commander: '*'
  ts-jest:
    dependencies:
      '@jest/transform': '*'
      '@jest/types': '*'
  typescript@7.0.2:
    dependencies:
      '@typescript/typescript6': 6.0.2
  vue-eslint-parser:
    dependencies:
      '@types/eslint-scope': '*'

patchedDependencies:
  '@types/mdx': patches/@types__mdx.patch
  '@vue/compiler-sfc': patches/@vue+compiler-sfc.patch
  typescript@7.0.2: patches/typescript@7.0.2.patch
  unicode-match-property-value-ecmascript@2.2.1: patches/unicode-match-property-value-ecmascript@2.2.1.patch
  unicode-match-property-ecmascript@2.0.0: patches/unicode-match-property-ecmascript@2.0.0.patch

allowBuilds:
  '@parcel/watcher': false
  '@swc/core': false
  core-js: false
  core-js-pure: false
  esbuild: true
  lefthook: true
  lmdb: false
  msw: false
  msgpackr-extract: false

minimumReleaseAgeExclude:
  - codescythe
  - codescythe-darwin-arm64
  - codescythe-linux-amd64
  - codescythe-linux-arm64
