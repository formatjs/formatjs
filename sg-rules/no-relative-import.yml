id: no-relative-import
language: typescript
message: "Relative imports are banned. Use absolute '#packages/' imports instead."
severity: error
rule:
  any:
    - pattern: "import $$$ARGS from '$PATH'"
    - pattern: "import type $$$ARGS from '$PATH'"
    - pattern: "export * from '$PATH'"
    - pattern: "export { $$$ARGS } from '$PATH'"
    - pattern: "export type { $$$ARGS } from '$PATH'"
constraints:
  PATH:
    regex: ^\.\.?/
files:
  - 'packages/**/*.ts'
  - 'packages/**/*.tsx'
ignores:
  - 'packages/*/examples/**'
  # tsd type tests use a separate tsconfig without #packages/ path mapping
  - 'packages/**/*.test-d.ts'
  # Scripts/tools run in Node with --experimental-transform-types
  # which can't resolve #packages/*.js to .ts files
  - 'packages/*/scripts/**'
  - 'packages/*/tools/**'
  # Imports ./package.json (JSON can't use #packages/ path mapping)
  - 'packages/eslint-plugin-formatjs/index.ts'
