name: Verify Commit Hooks

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

jobs:
  verify-hooks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 100

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Build Lefthook
        run: bazel build //:lefthook

      - name: Run Lefthook
        run: |
          BAZEL_BINDIR=. JS_BINARY__CHDIR="$PWD" bazel-bin/lefthook_/lefthook run pre-commit --all-files
          if [ -n "$(git status --porcelain)" ]; then
            echo "Error: Pre-commit hooks would have made changes. Please run the hooks locally and commit the changes."
            git diff
            exit 1
          fi

      - name: Validate Commit Messages
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }}
          commits=$(git rev-list origin/${{ github.base_ref }}..HEAD)

          for commit in $commits; do
            echo "Validating commit: $(git log -1 --oneline $commit)"
            msg_file=$(mktemp)
            git log -1 --format=%B $commit > "$msg_file"
            BAZEL_BINDIR=. JS_BINARY__CHDIR="$PWD" bazel-bin/lefthook_/lefthook run commit-msg "$msg_file"
            rm "$msg_file"
          done
