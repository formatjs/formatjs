name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release_please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      npm_paths: ${{ steps.npm-release-paths.outputs.npm_paths }}
      npm_release_created: ${{ steps.npm-release-paths.outputs.npm_release_created }}

    steps:
      # Release Please owns version/changelog PRs, GitHub release notes, and
      # the release-created signal used for npm publication below.
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Collect npm release paths
        id: npm-release-paths
        env:
          PATHS_RELEASED: ${{ steps.release.outputs.paths_released || '[]' }}
        run: |
          node <<'JS'
          const fs = require('node:fs')
          const paths = JSON.parse(process.env.PATHS_RELEASED || '[]')
          const npmPaths = paths.filter(path => path.startsWith('packages/'))
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `npm_paths=${JSON.stringify(npmPaths)}\n`
          )
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `npm_release_created=${npmPaths.length > 0}\n`
          )
          JS

  dispatch_release_npm:
    name: Dispatch npm Package Release
    needs: release_please
    if: ${{ needs.release_please.outputs.npm_release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Dispatch release workflow
        env:
          GH_TOKEN: ${{ github.token }}
          NPM_RELEASE_PATHS: ${{ needs.release_please.outputs.npm_paths }}
        run: |
          # Keep npm Trusted Publishing bound to release.yml by dispatching it
          # as the top-level workflow, not as a reusable workflow call.
          gh workflow run release.yml \
            --ref "$GITHUB_REF_NAME" \
            --raw-field "npm_paths=$NPM_RELEASE_PATHS"
