name: Test

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            bazel-config: ci
          - os: macos-latest
            bazel-config: ci-darwin

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Build Hermetic Timezone Data
        run: bazel build //packages/intl-datetimeformat:tz_data_generated

      - name: Run Tests
        if: matrix.os != 'macos-latest' || github.event_name != 'pull_request'
        run: |
          if [ -n "${{ secrets.BUILDBUDDY_ORG_API_KEY }}" ]; then
            echo "Running with BuildBuddy ${{ matrix.bazel-config }} config"
            bazel test --config=${{ matrix.bazel-config }} --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_ORG_API_KEY }} //...
          else
            echo "Running without BuildBuddy (no API key)"
            bazel test //...
          fi

      - name: Rust CLI Smoke Test
        if: matrix.os != 'macos-latest' || github.event_name != 'pull_request'
        run: |
          if [ -n "${{ secrets.BUILDBUDDY_ORG_API_KEY }}" ]; then
            bazel build \
              --config=${{ matrix.bazel-config }} \
              --compilation_mode=opt \
              --remote_download_outputs=all \
              --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_ORG_API_KEY }} \
              //crates/formatjs_cli
          else
            bazel build --compilation_mode=opt //crates/formatjs_cli
          fi
          BINARY_PATH=bazel-bin/crates/formatjs_cli/formatjs_cli
          $BINARY_PATH --version
          $BINARY_PATH --help

  examples:
    name: Examples (${{ matrix.example }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        example:
          - rescripts
          - strict-locale-type
          - strict-message-types

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-examples-${{ matrix.example }}
          repository-cache: true

      - name: Build Example
        working-directory: examples/${{ matrix.example }}
        run: bazel build //...

      - name: Test Example
        working-directory: examples/${{ matrix.example }}
        run: bazel test //...

  linux_musl_native_smoke:
    name: Linux musl Native Binding Smoke Test (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
            package: cli-native-linux-x64-musl
            cli-target: //crates/formatjs_cli:release_binary_linux_x64
          - arch: arm64
            runner: ubuntu-24.04-arm
            package: cli-native-linux-arm64-musl
            cli-target: //crates/formatjs_cli:release_binary_linux_arm64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-alpine-native-smoke
          repository-cache: true

      - name: Build Linux musl Native Package
        run: |
          bazel build //packages/${{ matrix.package }}:pkg
          package_dir=$(bazel cquery --output=files //packages/${{ matrix.package }}:pkg | tail -n 1)
          mkdir -p artifacts/${{ matrix.package }}
          cp -R "$package_dir"/. artifacts/${{ matrix.package }}/

          artifact_info=$(file artifacts/${{ matrix.package }}/formatjs_cli_napi.node)
          echo "$artifact_info"
          case "$artifact_info" in
            *"static-pie linked"* | *"statically linked"*)
              echo "musl Node addon must dynamically link libc"
              exit 1
              ;;
          esac
          if nm -a artifacts/${{ matrix.package }}/formatjs_cli_napi.node | grep 'init_have_lse_atomics' >/dev/null; then
            echo "musl Node addon must not run compiler-rt outline atomics init during dlopen"
            exit 1
          fi

      - name: Smoke Test Static musl CLI On GNU
        run: |
          bazel build ${{ matrix.cli-target }}
          binary_path=$(bazel cquery --output=files ${{ matrix.cli-target }} | tail -n 1)
          artifact_info=$(file "$binary_path")
          echo "$artifact_info"
          case "$artifact_info" in
            *"static-pie linked"* | *"statically linked"*)
              ;;
            *)
              echo "linux release CLI should be a static musl binary"
              exit 1
              ;;
          esac
          "$binary_path" --version
          "$binary_path" --help

      - name: Smoke Test Package In Alpine
        run: |
          docker run --rm \
            -v "$PWD/artifacts/${{ matrix.package }}:/native:ro" \
            node:24-alpine \
            node -e 'const native = require("/native"); const formatters = native.supportedBuiltinFormatters(); if (!formatters.includes("default")) throw new Error("Missing default formatter"); const output = native.compileMessages([{id: "hello", message: "Hello {name}", sourceFile: "smoke.json"}], {}); if (!output.includes("\"hello\"")) throw new Error(output); console.log(output);'

  windows_smoke:
    name: Windows Smoke Tests
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup MSVC
        uses: ./.github/actions/setup-msvc

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-windows-smoke
          repository-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Rust CLI Smoke Test
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $bazelWindowsFlags = @(
            '--compilation_mode=opt',
            '--repo_env==BAZEL_DO_NOT_DETECT_CPP_TOOLCHAIN',
            '--extra_toolchains=@local_config_cc//:cc-toolchain-x64_windows'
          )

          bazel build @bazelWindowsFlags //crates/formatjs_cli:release_binary_windows_x64
          $binaryPath = (bazel cquery @bazelWindowsFlags --output=files //crates/formatjs_cli:release_binary_windows_x64 | Select-Object -Last 1)
          & $binaryPath --version
          & $binaryPath --help

      - name: Native Binding Smoke Test
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $bazelWindowsFlags = @(
            '--compilation_mode=opt',
            '--repo_env==BAZEL_DO_NOT_DETECT_CPP_TOOLCHAIN',
            '--extra_toolchains=@local_config_cc//:cc-toolchain-x64_windows'
          )

          bazel build @bazelWindowsFlags //packages/cli-native-win32-x64:pkg
          $pkgPath = Resolve-Path (bazel cquery @bazelWindowsFlags --output=files //packages/cli-native-win32-x64:pkg | Select-Object -Last 1)
          $script = @'
          const fs = require('node:fs')
          const os = require('node:os')
          const path = require('node:path')
          const native = require(process.argv[2])

          const formatters = native.supportedBuiltinFormatters()
          if (!formatters.includes('default')) {
            throw new Error('Missing default formatter')
          }

          const messageDir = fs.mkdtempSync(path.join(os.tmpdir(), 'formatjs-cli-lib-'))
          const messageSubdir = path.join(messageDir, 'messages[prod]')
          fs.mkdirSync(messageSubdir)
          const messageFile = path.join(messageSubdir, 'primary.json')
          fs.writeFileSync(
            messageFile,
            JSON.stringify({
              hello: {
                message: 'Hello {name}',
                description: 'Smoke test message',
              },
            })
          )

          if (!messageFile.includes('\\')) {
            throw new Error(`Expected a native Windows path, got ${messageFile}`)
          }

          const output = native.compile([messageFile], {
            ast: true,
            format: 'crowdin',
          })
          const compiled = JSON.parse(output)
          if (!Array.isArray(compiled.hello)) {
            throw new Error(output)
          }
          console.log(output)

          const sourceSubdir = path.join(messageDir, 'src[prod]')
          fs.mkdirSync(sourceSubdir)
          const sourceFile = path.join(sourceSubdir, 'component.tsx')
          fs.writeFileSync(
            sourceFile,
            `
          import {defineMessage} from 'react-intl'

          defineMessage({
            id: 'native.extract',
            defaultMessage: 'Native extract smoke',
          })
          `
          )

          if (!sourceFile.includes('\\')) {
            throw new Error(`Expected a native Windows path, got ${sourceFile}`)
          }

          const extractedOutput = native.extract([sourceFile], {
            idInterpolationPattern: '[sha512:contenthash:base64:6]',
            throws: true,
          })
          const extracted = JSON.parse(extractedOutput)
          if (
            extracted['native.extract']?.defaultMessage !==
            'Native extract smoke'
          ) {
            throw new Error(extractedOutput)
          }
          console.log(extractedOutput)
          '@
          $script | node - $pkgPath
