name: Test

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            bazel-config: ci
          - os: macos-latest
            bazel-config: ci-darwin

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Run Tests
        if: matrix.os != 'macos-latest' || github.event_name != 'pull_request'
        run: |
          if [ -n "${{ secrets.BUILDBUDDY_ORG_API_KEY }}" ]; then
            echo "Running with BuildBuddy ${{ matrix.bazel-config }} config"
            bazel test --config=${{ matrix.bazel-config }} --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_ORG_API_KEY }} //...
          else
            echo "Running without BuildBuddy (no API key)"
            bazel test //...
          fi

      - name: Rust CLI Smoke Test
        if: matrix.os != 'macos-latest' || github.event_name != 'pull_request'
        run: |
          if [ -n "${{ secrets.BUILDBUDDY_ORG_API_KEY }}" ]; then
            bazel build \
              --config=${{ matrix.bazel-config }} \
              --compilation_mode=opt \
              --remote_download_outputs=all \
              --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_ORG_API_KEY }} \
              //crates/formatjs_cli
          else
            bazel build --compilation_mode=opt //crates/formatjs_cli
          fi
          BINARY_PATH=bazel-bin/crates/formatjs_cli/formatjs_cli
          $BINARY_PATH --version
          $BINARY_PATH --help

  windows_smoke:
    name: Windows Smoke Tests
    if: github.event_name != 'pull_request'
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-windows-smoke
          repository-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Rust CLI Smoke Test
        run: |
          bazel build //crates/formatjs_cli:release_binary_windows_x64
          $binaryPath = (bazel cquery --output=files //crates/formatjs_cli:release_binary_windows_x64 | Select-Object -Last 1)
          & $binaryPath --version
          & $binaryPath --help

      - name: Native Binding Smoke Test
        run: |
          bazel build //packages/cli-native-win32-x64:pkg
          $pkgPath = Resolve-Path (bazel cquery --output=files //packages/cli-native-win32-x64:pkg | Select-Object -Last 1)
          node -e 'const native = require(process.argv[1]); const formatters = native.supportedBuiltinFormatters(); if (!formatters.includes("default")) throw new Error("Missing default formatter"); const output = native.compileMessages([{id: "hello", message: "Hello {name}", sourceFile: "smoke.json"}], {}); if (!output.includes("\"hello\"")) throw new Error(output); console.log(output);' $pkgPath
