name: Test

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            bazel-config: ci
          - os: macos-latest
            bazel-config: ci-darwin

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Run Tests
        if: matrix.os != 'macos-latest' || github.event_name != 'pull_request'
        run: |
          if [ -n "${{ secrets.BUILDBUDDY_ORG_API_KEY }}" ]; then
            echo "Running with BuildBuddy ${{ matrix.bazel-config }} config"
            bazel test --config=${{ matrix.bazel-config }} --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_ORG_API_KEY }} //...
          else
            echo "Running without BuildBuddy (no API key)"
            bazel test //...
          fi

      - name: Rust CLI Smoke Test
        if: matrix.os != 'macos-latest' || github.event_name != 'pull_request'
        run: |
          if [ -n "${{ secrets.BUILDBUDDY_ORG_API_KEY }}" ]; then
            bazel build \
              --config=${{ matrix.bazel-config }} \
              --compilation_mode=opt \
              --remote_download_outputs=all \
              --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_ORG_API_KEY }} \
              //crates/formatjs_cli
          else
            bazel build --compilation_mode=opt //crates/formatjs_cli
          fi
          BINARY_PATH=bazel-bin/crates/formatjs_cli/formatjs_cli
          $BINARY_PATH --version
          $BINARY_PATH --help

  rust_cli_linux_x64_compat:
    name: Rust CLI Linux x64 Compatibility
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install Build Dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            file \
            git \
            openjdk-17-jdk \
            python3 \
            unzip \
            xz-utils \
            zip \
            zstd

      - name: Install Bazelisk
        run: |
          curl -fsSL \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 \
            -o /usr/local/bin/bazel
          chmod +x /usr/local/bin/bazel
          bazel version

      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Build Linux x64 Binary
        run: |
          bazel build //crates/formatjs_cli:release_binary_linux_x64

      - name: Smoke Test Linux x64 Binary
        run: |
          BINARY_PATH="$(bazel cquery --output=files //crates/formatjs_cli:release_binary_linux_x64)"
          file "$BINARY_PATH"
          "$BINARY_PATH" --version
          "$BINARY_PATH" --help

          ldd_output="$(ldd "$BINARY_PATH" 2>&1 || true)"
          echo "$ldd_output"
          if echo "$ldd_output" | grep -q "not a dynamic executable"; then
            echo "Linux binary is statically linked and does not require glibc"
          elif strings "$BINARY_PATH" | grep -q 'GLIBC_'; then
            echo "Linux musl binary unexpectedly references glibc symbols" >&2
            exit 1
          else
            echo "Linux binary does not reference glibc symbols"
          fi
