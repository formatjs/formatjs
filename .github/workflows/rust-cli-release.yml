name: Rust CLI Release

on:
  push:
    tags:
      - 'formatjs_cli_v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, no release)'
        type: boolean
        required: false
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_macos:
    name: Build macOS ARM64
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-macOS ARM64
          repository-cache: true

      - name: Build Binary
        run: |
          if [ -n "${{ secrets.BUILDBUDDY_ORG_API_KEY }}" ]; then
            bazel build \
              --config=ci-darwin \
              --compilation_mode=opt \
              --platforms=//crates/formatjs_cli/platforms:darwin_arm64 \
              --remote_download_outputs=all \
              --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_ORG_API_KEY }} \
              //crates/formatjs_cli:release_binary
          else
            bazel build \
              --compilation_mode=opt \
              --platforms=//crates/formatjs_cli/platforms:darwin_arm64 \
              //crates/formatjs_cli:release_binary
          fi

          # Copy binary to artifacts directory
          mkdir -p artifacts
          cp bazel-bin/crates/formatjs_cli/formatjs_cli_release artifacts/formatjs_cli-darwin-arm64
          chmod +x artifacts/formatjs_cli-darwin-arm64

      - name: Smoke Test
        run: |
          ./artifacts/formatjs_cli-darwin-arm64 --version
          ./artifacts/formatjs_cli-darwin-arm64 --help

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: formatjs_cli-darwin-arm64
          path: artifacts/formatjs_cli-darwin-arm64
          retention-days: 7

  build_linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-Linux x86_64-musl
          repository-cache: true

      - name: Build Binary
        run: |
          bazel build //crates/formatjs_cli:release_binary_linux_x64

          # Copy binary to artifacts directory
          BINARY_PATH="$(bazel cquery --output=files //crates/formatjs_cli:release_binary_linux_x64)"
          mkdir -p artifacts
          cp "$BINARY_PATH" artifacts/formatjs_cli-linux-x64
          chmod +x artifacts/formatjs_cli-linux-x64

      - name: Smoke Test
        run: |
          ./artifacts/formatjs_cli-linux-x64 --version
          ./artifacts/formatjs_cli-linux-x64 --help

      - name: Verify glibc Compatibility
        run: |
          file artifacts/formatjs_cli-linux-x64
          ldd_output="$(ldd artifacts/formatjs_cli-linux-x64 2>&1 || true)"
          echo "$ldd_output"
          if echo "$ldd_output" | grep -q "not a dynamic executable"; then
            echo "Linux binary is statically linked and does not require glibc"
          elif strings artifacts/formatjs_cli-linux-x64 | grep -q 'GLIBC_'; then
            echo "Linux musl binary unexpectedly references glibc symbols" >&2
            exit 1
          else
            echo "Linux binary does not reference glibc symbols"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: formatjs_cli-linux-x64
          path: artifacts/formatjs_cli-linux-x64
          retention-days: 7

  release:
    name: Create Release
    needs:
      - build_macos
      - build_linux
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ !inputs.dry_run }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: release/

      - name: Organize Artifacts
        run: |
          # List downloaded artifacts structure for debugging
          ls -R release/

          # Move binaries from subdirectories to release root
          mv release/formatjs_cli-darwin-arm64/formatjs_cli-darwin-arm64 release/formatjs_cli-darwin-arm64.bin
          mv release/formatjs_cli-linux-x64/formatjs_cli-linux-x64 release/formatjs_cli-linux-x64.bin

          # Remove empty directories
          rmdir release/formatjs_cli-darwin-arm64 release/formatjs_cli-linux-x64

          # Rename binaries to final names
          mv release/formatjs_cli-darwin-arm64.bin release/formatjs_cli-darwin-arm64
          mv release/formatjs_cli-linux-x64.bin release/formatjs_cli-linux-x64

      - name: Generate Checksums
        run: |
          cd release
          shasum -a 256 formatjs_cli-* > checksums.txt
          cat checksums.txt

      - name: List Release Artifacts
        run: |
          ls -lh release/
          echo "---"
          echo "Checksums:"
          cat release/checksums.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/formatjs_cli_v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/formatjs_cli-darwin-arm64
            release/formatjs_cli-linux-x64
            release/checksums.txt
          body: |
            ## FormatJS Rust CLI Release

            ### Binaries
            - **macOS Apple Silicon**: `formatjs_cli-darwin-arm64`
            - **Linux x86_64**: `formatjs_cli-linux-x64`

            ### Installation

            ```bash
            # macOS (Apple Silicon)
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/formatjs_cli-darwin-arm64
            chmod +x formatjs_cli-darwin-arm64
            sudo mv formatjs_cli-darwin-arm64 /usr/local/bin/formatjs

            # Linux
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/formatjs_cli-linux-x64
            chmod +x formatjs_cli-linux-x64
            sudo mv formatjs_cli-linux-x64 /usr/local/bin/formatjs
            ```

            ### Verification

            Verify the checksums:
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/checksums.txt
            shasum -a 256 -c checksums.txt
            ```
          draft: false
          prerelease: false
