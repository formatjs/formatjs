name: Rust CLI Release

on:
  push:
    tags:
      - 'formatjs_cli_v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, no release)'
        type: boolean
        required: false
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Release Binaries
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-release-binaries
          repository-cache: true

      - name: Build Binaries
        run: |
          if [ -n "${{ secrets.BUILDBUDDY_ORG_API_KEY }}" ]; then
            bazel build \
              --config=ci-darwin \
              --compilation_mode=opt \
              --remote_download_outputs=all \
              --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_ORG_API_KEY }} \
              //crates/formatjs_cli:release_binary_darwin_arm64 \
              //crates/formatjs_cli:release_binary_linux_x64 \
              //crates/formatjs_cli:release_binary_linux_arm64
          else
            bazel build \
              --compilation_mode=opt \
              //crates/formatjs_cli:release_binary_darwin_arm64 \
              //crates/formatjs_cli:release_binary_linux_x64 \
              //crates/formatjs_cli:release_binary_linux_arm64
          fi

          mkdir -p artifacts

          copy_artifact() {
            local target="$1"
            local output="$2"
            local binary_path
            binary_path="$(bazel cquery --output=files "$target")"
            cp "$binary_path" "artifacts/$output"
            chmod +x "artifacts/$output"
          }

          copy_artifact //crates/formatjs_cli:release_binary_darwin_arm64 formatjs_cli-darwin-arm64
          copy_artifact //crates/formatjs_cli:release_binary_linux_x64 formatjs_cli-linux-x64
          copy_artifact //crates/formatjs_cli:release_binary_linux_arm64 formatjs_cli-linux-arm64

      - name: Upload macOS ARM64 Artifact
        uses: actions/upload-artifact@v7
        with:
          name: formatjs_cli-darwin-arm64
          path: artifacts/formatjs_cli-darwin-arm64
          retention-days: 7

      - name: Upload Linux x64 Artifact
        uses: actions/upload-artifact@v7
        with:
          name: formatjs_cli-linux-x64
          path: artifacts/formatjs_cli-linux-x64
          retention-days: 7

      - name: Upload Linux ARM64 Artifact
        uses: actions/upload-artifact@v7
        with:
          name: formatjs_cli-linux-arm64
          path: artifacts/formatjs_cli-linux-arm64
          retention-days: 7

  build_windows:
    name: Build Windows x64 Binary
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-windows-release-binary
          repository-cache: true

      - name: Build Binary
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $bazelWindowsFlags = @(
            '--repo_env==BAZEL_DO_NOT_DETECT_CPP_TOOLCHAIN',
            '--extra_toolchains=@local_config_cc//:cc-toolchain-x64_windows'
          )

          bazel build @bazelWindowsFlags //crates/formatjs_cli:release_binary_windows_x64
          $binaryPath = (bazel cquery @bazelWindowsFlags --output=files //crates/formatjs_cli:release_binary_windows_x64 | Select-Object -Last 1)
          New-Item -ItemType Directory -Force artifacts
          Copy-Item $binaryPath artifacts\formatjs_cli-win32-x64.exe

      - name: Upload Windows x64 Artifact
        uses: actions/upload-artifact@v7
        with:
          name: formatjs_cli-win32-x64.exe
          path: artifacts/formatjs_cli-win32-x64.exe
          retention-days: 7

  verify_macos:
    name: Verify macOS ARM64
    needs: build
    runs-on: macos-latest

    steps:
      - name: Download macOS ARM64 Artifact
        uses: actions/download-artifact@v8
        with:
          name: formatjs_cli-darwin-arm64
          path: artifacts

      - name: Smoke Test
        run: |
          chmod +x artifacts/formatjs_cli-darwin-arm64
          ./artifacts/formatjs_cli-darwin-arm64 --version
          ./artifacts/formatjs_cli-darwin-arm64 --help

  verify_linux:
    name: Verify Linux
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux x64 Artifact
        uses: actions/download-artifact@v8
        with:
          name: formatjs_cli-linux-x64
          path: artifacts

      - name: Download Linux ARM64 Artifact
        uses: actions/download-artifact@v8
        with:
          name: formatjs_cli-linux-arm64
          path: artifacts

      - name: Smoke Test
        run: |
          chmod +x artifacts/formatjs_cli-linux-x64
          ./artifacts/formatjs_cli-linux-x64 --version
          ./artifacts/formatjs_cli-linux-x64 --help

      - name: Inspect Binaries
        run: |
          chmod +x artifacts/formatjs_cli-linux-x64 artifacts/formatjs_cli-linux-arm64
          for binary in artifacts/formatjs_cli-linux-x64 artifacts/formatjs_cli-linux-arm64; do
            file "$binary"
            ldd_output="$(ldd "$binary" 2>&1 || true)"
            echo "$ldd_output"
            if echo "$ldd_output" | grep -q "not a dynamic executable"; then
              echo "$binary is statically linked and does not require glibc"
            elif strings "$binary" | grep -q 'GLIBC_'; then
              echo "$binary unexpectedly references glibc symbols" >&2
              exit 1
            else
              echo "$binary does not reference glibc symbols"
            fi
          done

  verify_windows:
    name: Verify Windows x64
    needs: build_windows
    runs-on: windows-latest

    steps:
      - name: Download Windows x64 Artifact
        uses: actions/download-artifact@v8
        with:
          name: formatjs_cli-win32-x64.exe
          path: artifacts

      - name: Smoke Test
        run: |
          .\artifacts\formatjs_cli-win32-x64.exe --version
          .\artifacts\formatjs_cli-win32-x64.exe --help

  release:
    name: Create Release
    needs:
      - build
      - verify_macos
      - verify_linux
      - verify_windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ !inputs.dry_run }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: release/

      - name: Organize Artifacts
        run: |
          # List downloaded artifacts structure for debugging
          ls -R release/

          # Move binaries from subdirectories to release root
          mv release/formatjs_cli-darwin-arm64/formatjs_cli-darwin-arm64 release/formatjs_cli-darwin-arm64.bin
          mv release/formatjs_cli-linux-arm64/formatjs_cli-linux-arm64 release/formatjs_cli-linux-arm64.bin
          mv release/formatjs_cli-linux-x64/formatjs_cli-linux-x64 release/formatjs_cli-linux-x64.bin
          mv release/formatjs_cli-win32-x64.exe/formatjs_cli-win32-x64.exe release/formatjs_cli-win32-x64.exe.bin

          # Remove empty directories
          rmdir release/formatjs_cli-darwin-arm64 release/formatjs_cli-linux-arm64 release/formatjs_cli-linux-x64 release/formatjs_cli-win32-x64.exe

          # Rename binaries to final names
          mv release/formatjs_cli-darwin-arm64.bin release/formatjs_cli-darwin-arm64
          mv release/formatjs_cli-linux-arm64.bin release/formatjs_cli-linux-arm64
          mv release/formatjs_cli-linux-x64.bin release/formatjs_cli-linux-x64
          mv release/formatjs_cli-win32-x64.exe.bin release/formatjs_cli-win32-x64.exe

      - name: Generate Checksums
        run: |
          cd release
          shasum -a 256 formatjs_cli-* > checksums.txt
          cat checksums.txt

      - name: List Release Artifacts
        run: |
          ls -lh release/
          echo "---"
          echo "Checksums:"
          cat release/checksums.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/formatjs_cli_v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/formatjs_cli-darwin-arm64
            release/formatjs_cli-linux-arm64
            release/formatjs_cli-linux-x64
            release/formatjs_cli-win32-x64.exe
            release/checksums.txt
          body: |
            ## FormatJS Rust CLI Release

            ### Binaries
            - **macOS Apple Silicon**: `formatjs_cli-darwin-arm64`
            - **Linux ARM64**: `formatjs_cli-linux-arm64`
            - **Linux x86_64**: `formatjs_cli-linux-x64`
            - **Windows x64**: `formatjs_cli-win32-x64.exe`

            ### Installation

            ```bash
            # macOS (Apple Silicon)
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/formatjs_cli-darwin-arm64
            chmod +x formatjs_cli-darwin-arm64
            sudo mv formatjs_cli-darwin-arm64 /usr/local/bin/formatjs

            # Linux
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/formatjs_cli-linux-x64
            chmod +x formatjs_cli-linux-x64
            sudo mv formatjs_cli-linux-x64 /usr/local/bin/formatjs

            # Linux ARM64
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/formatjs_cli-linux-arm64
            chmod +x formatjs_cli-linux-arm64
            sudo mv formatjs_cli-linux-arm64 /usr/local/bin/formatjs
            ```

            ```powershell
            # Windows x64 (PowerShell)
            curl.exe -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/formatjs_cli-win32-x64.exe
            ```

            ### Verification

            Verify the checksums:
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/checksums.txt
            shasum -a 256 -c checksums.txt
            ```
          draft: false
          prerelease: false
