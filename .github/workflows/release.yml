name: Release

on:
  workflow_dispatch:
    inputs:
      npm_paths:
        description: 'JSON array of released package paths to publish'
        required: true
        default: '[]'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_windows_native:
    name: Build Windows Native Package
    if: ${{ inputs.npm_paths != '[]' }}
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup MSVC
        uses: ./.github/actions/setup-msvc

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-windows-native
          repository-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build Package
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $bazelWindowsFlags = @(
            '--compilation_mode=opt',
            '--repo_env==BAZEL_DO_NOT_DETECT_CPP_TOOLCHAIN',
            '--extra_toolchains=@local_config_cc//:cc-toolchain-x64_windows'
          )

          bazel build @bazelWindowsFlags //packages/cli-native-win32-x64:pkg
          $pkgPath = (bazel cquery @bazelWindowsFlags --output=files //packages/cli-native-win32-x64:pkg | Select-Object -Last 1)
          New-Item -ItemType Directory -Force artifacts\cli-native-win32-x64
          Copy-Item -Path (Join-Path $pkgPath '*') -Destination artifacts\cli-native-win32-x64 -Recurse -Force

      - name: Smoke Test Package
        run: |
          node -e 'const native = require(process.argv[1]); const formatters = native.supportedBuiltinFormatters(); if (!formatters.includes("default")) throw new Error("Missing default formatter"); const output = native.compileMessages([{id: "hello", message: "Hello {name}", sourceFile: "smoke.json"}], {}); if (!output.includes("\"hello\"")) throw new Error(output); console.log(output);' ./artifacts/cli-native-win32-x64

      - name: Upload Package
        uses: actions/upload-artifact@v7
        with:
          name: cli-native-win32-x64
          path: artifacts/cli-native-win32-x64
          retention-days: 7

  build_linux_musl_native:
    name: Build Linux musl Native Package (${{ matrix.arch }})
    if: ${{ inputs.npm_paths != '[]' }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
            package: cli-native-linux-x64-musl
          - arch: arm64
            runner: ubuntu-24.04-arm
            package: cli-native-linux-arm64-musl

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.package }}
          repository-cache: true

      - name: Build Package
        run: |
          bazel build --compilation_mode=opt //packages/${{ matrix.package }}:pkg
          package_dir=$(bazel cquery --compilation_mode=opt --output=files //packages/${{ matrix.package }}:pkg | tail -n 1)
          mkdir -p artifacts/${{ matrix.package }}
          cp -R "$package_dir"/. artifacts/${{ matrix.package }}/

          artifact_info=$(file artifacts/${{ matrix.package }}/formatjs_cli_napi.node)
          echo "$artifact_info"
          case "$artifact_info" in
            *"static-pie linked"* | *"statically linked"*)
              echo "musl Node addon must dynamically link libc"
              exit 1
              ;;
          esac
          if nm -a artifacts/${{ matrix.package }}/formatjs_cli_napi.node | grep 'init_have_lse_atomics' >/dev/null; then
            echo "musl Node addon must not run compiler-rt outline atomics init during dlopen"
            exit 1
          fi

      - name: Smoke Test Package
        run: |
          docker run --rm \
            -v "$PWD/artifacts/${{ matrix.package }}:/native:ro" \
            node:24-alpine \
            node -e 'const native = require("/native"); const formatters = native.supportedBuiltinFormatters(); if (!formatters.includes("default")) throw new Error("Missing default formatter"); const output = native.compileMessages([{id: "hello", message: "Hello {name}", sourceFile: "smoke.json"}], {}); if (!output.includes("\"hello\"")) throw new Error(output); console.log(output);'

      - name: Upload Package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package }}
          path: artifacts/${{ matrix.package }}
          retention-days: 7

  release:
    needs:
      - build_windows_native
      - build_linux_musl_native
    if: ${{ inputs.npm_paths != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Build Distribution
        run: |
          bazel build \
            --config=ci \
            --compilation_mode=opt \
            --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_ORG_API_KEY }} \
            :dist
          DIST_PATH=$(bazel cquery --config=ci --compilation_mode=opt --output=files :dist)
          echo "Distribution path: $DIST_PATH"
          cp -rf "$DIST_PATH" release/
          chmod -R +w release/

      - name: Download Windows Native Package
        uses: actions/download-artifact@v8
        with:
          name: cli-native-win32-x64
          path: release/packages/cli-native-win32-x64

      - name: Download Linux x64 musl Native Package
        uses: actions/download-artifact@v8
        with:
          name: cli-native-linux-x64-musl
          path: release/packages/cli-native-linux-x64-musl

      - name: Download Linux arm64 musl Native Package
        uses: actions/download-artifact@v8
        with:
          name: cli-native-linux-arm64-musl
          path: release/packages/cli-native-linux-arm64-musl

      - name: Prepare npm Package Manifests
        working-directory: release
        run: |
          node <<'JS'
          const fs = require('node:fs')
          const path = require('node:path')

          const dependencyFields = [
            'dependencies',
            'optionalDependencies',
            'peerDependencies',
          ]
          const packageRoot = path.join(process.cwd(), 'packages')
          const packageJsonPaths = fs
            .readdirSync(packageRoot, {withFileTypes: true})
            .filter(entry => entry.isDirectory())
            .map(entry => path.join(packageRoot, entry.name, 'package.json'))
            .filter(file => fs.existsSync(file))
          const manifests = packageJsonPaths.map(file => ({
            file,
            packageJson: JSON.parse(fs.readFileSync(file, 'utf8')),
          }))
          const packageVersions = new Map(
            manifests.map(({packageJson}) => [
              packageJson.name,
              packageJson.version,
            ])
          )
          let replacements = 0

          for (const {file, packageJson} of manifests) {
            let changed = false

            for (const field of dependencyFields) {
              const dependencies = packageJson[field]
              if (
                !dependencies ||
                typeof dependencies !== 'object' ||
                Array.isArray(dependencies)
              ) {
                continue
              }

              for (const [name, specifier] of Object.entries(dependencies)) {
                if (
                  typeof specifier !== 'string' ||
                  !specifier.startsWith('workspace:')
                ) {
                  continue
                }
                if (specifier !== 'workspace:*') {
                  throw new Error(
                    `${file} uses unsupported workspace dependency range ${name}@${specifier}`
                  )
                }

                const packageVersion = packageVersions.get(name)
                if (!packageVersion) {
                  throw new Error(
                    `${file} references missing workspace package ${name}`
                  )
                }

                dependencies[name] = packageVersion
                replacements += 1
                changed = true
              }
            }

            if (changed) {
              fs.writeFileSync(file, JSON.stringify(packageJson, null, 2) + '\n')
            }
          }

          console.log(`Prepared ${replacements} workspace dependency version(s).`)
          JS

      - name: Publish released npm packages
        working-directory: release
        env:
          NPM_RELEASE_PATHS: ${{ inputs.npm_paths }}
        run: |
          mapfile -t package_paths < <(
            node -e 'JSON.parse(process.env.NPM_RELEASE_PATHS || "[]").forEach(path => console.log(path))'
          )

          if [ "${#package_paths[@]}" -eq 0 ]; then
            echo "No npm package releases to publish."
            exit 0
          fi

          for package_path in "${package_paths[@]}"; do
            if [ ! -d "$package_path" ]; then
              echo "::error::Release package path does not exist in Bazel distribution: $package_path"
              exit 1
            fi

            echo "Publishing $package_path"
            (cd "$package_path" && pnpm publish --access public --no-git-checks)
          done
