name: Release

on:
  workflow_dispatch:
    inputs:
      npm_paths:
        description: 'JSON array of released package paths to publish'
        required: true
        default: '[]'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_windows_native:
    name: Build Windows Native Package
    if: ${{ inputs.npm_paths != '[]' }}
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup MSVC
        uses: ./.github/actions/setup-msvc

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-windows-native
          repository-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build Package
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $bazelWindowsFlags = @(
            '--repo_env==BAZEL_DO_NOT_DETECT_CPP_TOOLCHAIN',
            '--extra_toolchains=@local_config_cc//:cc-toolchain-x64_windows'
          )

          bazel build @bazelWindowsFlags //packages/cli-native-win32-x64:pkg
          $pkgPath = (bazel cquery @bazelWindowsFlags --output=files //packages/cli-native-win32-x64:pkg | Select-Object -Last 1)
          New-Item -ItemType Directory -Force artifacts\cli-native-win32-x64
          Copy-Item -Path (Join-Path $pkgPath '*') -Destination artifacts\cli-native-win32-x64 -Recurse -Force

      - name: Smoke Test Package
        run: |
          node -e 'const native = require(process.argv[1]); const formatters = native.supportedBuiltinFormatters(); if (!formatters.includes("default")) throw new Error("Missing default formatter"); const output = native.compileMessages([{id: "hello", message: "Hello {name}", sourceFile: "smoke.json"}], {}); if (!output.includes("\"hello\"")) throw new Error(output); console.log(output);' ./artifacts/cli-native-win32-x64

      - name: Upload Package
        uses: actions/upload-artifact@v7
        with:
          name: cli-native-win32-x64
          path: artifacts/cli-native-win32-x64
          retention-days: 7

  release:
    needs: build_windows_native
    if: ${{ inputs.npm_paths != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.3.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Build Distribution
        run: |
          bazel build \
            --config=ci \
            --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_ORG_API_KEY }} \
            :dist
          DIST_PATH=$(bazel cquery --config=ci --output=files :dist)
          echo "Distribution path: $DIST_PATH"
          cp -rf "$DIST_PATH" release/
          chmod -R +w release/

      - name: Download Windows Native Package
        uses: actions/download-artifact@v8
        with:
          name: cli-native-win32-x64
          path: release/packages/cli-native-win32-x64

      - name: Install Dependencies
        working-directory: release
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Publish released npm packages
        working-directory: release
        env:
          NPM_RELEASE_PATHS: ${{ inputs.npm_paths }}
        run: |
          mapfile -t package_paths < <(
          node <<'JS'
          const fs = require('node:fs')
          const path = require('node:path')

          const packagePaths = [
            ...new Set(JSON.parse(process.env.NPM_RELEASE_PATHS || '[]')),
          ]
          const packagesByPath = new Map()
          const packagesByName = new Map()
          const dependencyFields = [
            'dependencies',
            'devDependencies',
            'peerDependencies',
            'optionalDependencies',
          ]

          for (const packagePath of packagePaths) {
            const packageJsonPath = path.join(packagePath, 'package.json')
            const pkg = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'))
            const entry = {path: packagePath, pkg}
            packagesByPath.set(packagePath, entry)
            packagesByName.set(pkg.name, entry)
          }

          const visiting = new Set()
          const visited = new Set()
          const sortedPackagePaths = []

          function visit(entry) {
            if (visited.has(entry.path)) {
              return
            }

            if (visiting.has(entry.path)) {
              throw new Error(`Cycle in selected npm release paths at ${entry.path}`)
            }

            visiting.add(entry.path)

            for (const field of dependencyFields) {
              for (const depName of Object.keys(entry.pkg[field] ?? {})) {
                const dep = packagesByName.get(depName)
                if (dep) {
                  visit(dep)
                }
              }
            }

            visiting.delete(entry.path)
            visited.add(entry.path)
            sortedPackagePaths.push(entry.path)
          }

          for (const packagePath of packagePaths) {
            visit(packagesByPath.get(packagePath))
          }

          for (const packagePath of sortedPackagePaths) {
            console.log(packagePath)
          }
          JS
          )

          if [ "${#package_paths[@]}" -eq 0 ]; then
            echo "No npm package releases to publish."
            exit 0
          fi

          for package_path in "${package_paths[@]}"; do
            if [ ! -d "$package_path" ]; then
              echo "::error::Release package path does not exist in Bazel distribution: $package_path"
              exit 1
            fi

            package_name=$(cd "$package_path" && node -p "require('./package.json').name")
            package_version=$(cd "$package_path" && node -p "require('./package.json').version")

            if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
              echo "$package_name@$package_version is already published; skipping."
              continue
            fi

            echo "Publishing $package_name@$package_version from $package_path"
            (cd "$package_path" && pnpm publish --access public --no-git-checks)
          done
